# Render Blueprint — deploy LinguaChat as a single Web Service
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: linguachat
    runtime: node
    region: oregon
    plan: free
    buildCommand: "cd client && npm install --include=dev && npm run build && cd ../server && npm install"
    startCommand: "cd server && NODE_ENV=production TRANSLATION_PROVIDER=mock node src/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRANSLATION_PROVIDER
        value: mock
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:REDACTED@ep-round-brook-ahx9w7yv-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      - key: CLERK_SECRET_KEY
        value: "REDACTED"
      - key: CLERK_PUBLISHABLE_KEY
        value: "pk_test_Y3V0ZS11bmljb3JuLTEzLmNsZXJrLmFjY291bnRzLmRldiQ"
      - key: VITE_CLERK_PUBLISHABLE_KEY
        value: "pk_test_Y3V0ZS11bmljb3JuLTEzLmNsZXJrLmFjY291bnRzLmRldiQ"
