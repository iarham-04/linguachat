# Render Blueprint — deploy LinguaChat as a single Web Service
# https://render.com/docs/blueprint-spec
#
# IMPORTANT: All secret values are managed through the Render Dashboard.
# Never commit real credentials here. Use 'sync: false' for secrets.

services:
  - type: web
    name: linguachat
    runtime: node
    region: oregon
    plan: free
    buildCommand: "cd client && npm install --include=dev && npm run build && cd ../server && npm install"
    startCommand: "cd server && NODE_ENV=production TRANSLATION_PROVIDER=mock node src/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRANSLATION_PROVIDER
        value: mock
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false  # Set in Render Dashboard — never commit secrets
      - key: CLERK_SECRET_KEY
        sync: false  # Set in Render Dashboard — never commit secrets
      - key: CLERK_PUBLISHABLE_KEY
        sync: false  # Set in Render Dashboard — never commit secrets
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false  # Set in Render Dashboard — never commit secrets
