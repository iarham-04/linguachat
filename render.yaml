# Render Blueprint — deploy LinguaChat as a single Web Service
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: linguachat
    runtime: node
    region: oregon
    plan: free
    buildCommand: "cd client && npm install --include=dev && npm run build && cd ../server && npm install"
    startCommand: "cd server && NODE_ENV=production TRANSLATION_PROVIDER=mock node src/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRANSLATION_PROVIDER
        value: mock
      - key: PORT
        value: 10000
